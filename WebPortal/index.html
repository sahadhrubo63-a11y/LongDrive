<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LongDrive - Online Menu</title>
    <style>
        body { background-color: #111; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; }
        .container { margin-top: 50px; }
        .selection-box { display: inline-block; margin: 20px; padding: 20px; border: 2px solid #333; border-radius: 10px; background: #222; width: 250px; }
        .btn { background-color: #ff4757; color: white; border: none; padding: 12px 24px; font-size: 18px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .btn:hover { background-color: #e84118; }
        select { width: 100%; padding: 10px; margin-top: 10px; background: #333; color: white; border: 1px solid #555; }
    </style>
</head>
<body>

    <h1>🚗 L O N G D R I V E</h1>
    <p>Realistic Cross-Continent Driving Simulator (Online)</p>

    <div class="container">
        <div class="selection-box">
            <h3>Select Vehicle</h3>
            <select id="carBrand" onchange="updateSelection()">
                <option value="Toyota_SUV">Toyota (SUV)</option>
                <option value="BMW_Sedan">BMW (Sedan)</option>
                <option value="Jeep_Wrangler">Jeep (Off-Road)</option>
            </select>
        </div>

        <div class="selection-box">
            <h3>Select Location</h3>
            <select id="location" onchange="updateSelection()">
                <option value="BD_Bandarban">Bangladesh (Bandarban)</option>
                <option value="IN_Kashmir">India (Kashmir)</option>
                <option value="EU_Switzerland">Europe (Switzerland)</option>
            </select>
        </div>
    </div>

    <br>
    <button class="btn" onclick="startLongDrive()">START LONG DRIVE</button>
    <h4 id="status" style="color: #2ed573; margin-top: 30px;">Lobby Status: Waiting for player...</h4>

    <script src="app.js"></script>
</body>
</html>
